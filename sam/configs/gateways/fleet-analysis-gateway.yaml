# Fleet Analysis Event Mesh Gateway
# ─────────────────────────────────────────────────────────────────────────────
# Triggers LLM analysis on FLEET_CRITICAL events published by the pipeline.
#
# This gateway:
#   - Subscribes to: sensors/fleet/analysis-request
#   - Routes to: FleetQueryAgent for analysis
#   - Supports Slack output via the slack-bot gateway
#
# This is appropriate for LOW-FREQUENCY, HIGH-VALUE events only.
# The deterministic pipeline handles high-volume processing.
#
# Setup:
#   sam plugin add fleet-analysis --plugin sam-event-mesh-gateway
#
# Environment Variables:
#   FLEET_ANALYSIS_SOLACE_BROKER_URL - Data plane broker URL
#   FLEET_ANALYSIS_SOLACE_BROKER_VPN - VPN name
#   FLEET_ANALYSIS_SOLACE_BROKER_USERNAME - Username
#   FLEET_ANALYSIS_SOLACE_BROKER_PASSWORD - Password
# ─────────────────────────────────────────────────────────────────────────────

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: fleet-analysis-gateway.log

!include ../shared_config.yaml

apps:
  - name: fleet-analysis-gateway-app
    app_module: sam_event_mesh_gateway.app
    broker:
      <<: *broker_connection
      # Override with data plane broker if different from control plane
      # broker_url: ${FLEET_ANALYSIS_SOLACE_BROKER_URL}
      # broker_vpn: ${FLEET_ANALYSIS_SOLACE_BROKER_VPN}
      # broker_username: ${FLEET_ANALYSIS_SOLACE_BROKER_USERNAME}
      # broker_password: ${FLEET_ANALYSIS_SOLACE_BROKER_PASSWORD}

    app_config:
      namespace: "${NAMESPACE}"
      # Data-plane broker config required by sam-event-mesh-gateway plugin
      event_mesh_broker_config:
        broker_url: ${SOLACE_BROKER_URL}
        broker_vpn: ${SOLACE_BROKER_VPN}
        broker_username: ${SOLACE_BROKER_USERNAME}
        broker_password: ${SOLACE_BROKER_PASSWORD}
      
      # Event handlers define what events trigger the gateway
      event_handlers:
        - name: "fleet_critical_handler"
          # Subscribe to analysis requests from the deterministic pipeline
          subscriptions:
            - topic: "sensors/fleet/analysis-request"
              qos: 1
          target_agent_name: "FleetQueryAgent"
          # Data-plane events don't carry end-user claims; stamp service identity.
          default_user_identity: "fleet-analysis-automation"
          
          # Transform the incoming JSON event into a prompt for the agent
          input_expression: "template:FLEET CRITICAL EVENT - Automatic Analysis Triggered. Analyze this payload and provide concise Slack-ready output with severity, likely causes, and immediate actions. Payload: {{json://input.payload}}"
          
          payload_encoding: "utf-8"
          payload_format: "json"
          on_success: "fleet_analysis_success"
          on_error: "fleet_analysis_error"
      
      # Route to Fleet Query Agent
      default_agent_name: "FleetQueryAgent"

      output_handlers:
        - name: "fleet_analysis_success"
          topic_expression: "static:sensors/fleet/analysis-response"
          payload_expression: "task_response:text"
          payload_encoding: "utf-8"
          payload_format: "text"
        - name: "fleet_analysis_error"
          topic_expression: "static:sensors/fleet/analysis-error"
          payload_expression: "task_response:a2a_task_response.error"
          payload_encoding: "utf-8"
          payload_format: "json"
      
      # Artifact service for any attachments
      artifact_service: *default_artifact_service
      
      # System purpose for this gateway's context
      system_purpose: |
        You are an automated fleet analysis system responding to a FLEET_CRITICAL event.
        
        This analysis was automatically triggered because multiple sensors (50%+) entered 
        critical state simultaneously, indicating a likely correlated event.
        
        Your job is to:
        1. Analyze the pattern of critical events using the database tools
        2. Determine the most likely cause (shared environmental vs independent failures)
        3. Provide clear, actionable recommendations for operators
        
        Be concise - this is an automated alert, not a conversation.
        Use emoji status indicators: 🔴 Critical, 🟡 Warning, 🟢 Normal, ⚠️ Action needed
      
      # Response handling - publish to response topic
      # The Slack gateway or other consumers can subscribe to this
      response_topic: "sensors/fleet/analysis-response"

      # This gateway is fed by internal broker events (no user JWT claims on message).
      # Provide a stable service identity so AuthAndEnrich does not discard triggers.
      default_user_identity: "fleet-analysis-automation"
      force_user_identity: "fleet-analysis-automation"
      
      # Authorization (none for internal automated triggers)
      authorization_service:
        type: "none"
