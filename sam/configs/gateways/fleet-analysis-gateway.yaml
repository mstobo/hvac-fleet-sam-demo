# Fleet Analysis Event Mesh Gateway
# ─────────────────────────────────────────────────────────────────────────────
# Triggers LLM analysis on FLEET_CRITICAL events published by the pipeline.
#
# This gateway:
#   - Subscribes to: sensors/fleet/analysis-request
#   - Routes to: FleetQueryAgent for analysis
#   - Supports Slack output via the slack-bot gateway
#
# This is appropriate for LOW-FREQUENCY, HIGH-VALUE events only.
# The deterministic pipeline handles high-volume processing.
#
# Setup:
#   sam plugin add fleet-analysis --plugin sam-event-mesh-gateway
#
# Environment Variables:
#   FLEET_ANALYSIS_SOLACE_BROKER_URL - Data plane broker URL
#   FLEET_ANALYSIS_SOLACE_BROKER_VPN - VPN name
#   FLEET_ANALYSIS_SOLACE_BROKER_USERNAME - Username
#   FLEET_ANALYSIS_SOLACE_BROKER_PASSWORD - Password
# ─────────────────────────────────────────────────────────────────────────────

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: fleet-analysis-gateway.log

!include ../shared_config.yaml

apps:
  - name: fleet-analysis-gateway-app
    app_module: sam_event_mesh_gateway.app
    broker:
      <<: *broker_connection
      # Override with data plane broker if different from control plane
      # broker_url: ${FLEET_ANALYSIS_SOLACE_BROKER_URL}
      # broker_vpn: ${FLEET_ANALYSIS_SOLACE_BROKER_VPN}
      # broker_username: ${FLEET_ANALYSIS_SOLACE_BROKER_USERNAME}
      # broker_password: ${FLEET_ANALYSIS_SOLACE_BROKER_PASSWORD}

    app_config:
      namespace: "${NAMESPACE}"
      gateway_id: ${FLEET_ANALYSIS_GATEWAY_ID, fleet-analysis-gw}
      # Data-plane broker config required by sam-event-mesh-gateway plugin.
      # Use temporary_queue so restarts do not fight for a single exclusive durable queue
      # (SOLCLIENT_SUBCODE_MAX_CLIENTS_FOR_QUEUE on Solace Cloud).
      event_mesh_broker_config:
        broker_url: ${SOLACE_BROKER_URL}
        broker_vpn: ${SOLACE_BROKER_VPN}
        broker_username: ${SOLACE_BROKER_USERNAME}
        broker_password: ${SOLACE_BROKER_PASSWORD}
        temporary_queue: ${USE_TEMPORARY_QUEUES, true}
      
      # Event handlers define what events trigger the gateway
      event_handlers:
        - name: "fleet_critical_handler"
          # Subscribe to analysis requests from the deterministic pipeline
          subscriptions:
            - topic: "sensors/fleet/analysis-request"
              qos: 1
          target_agent_name: "FleetQueryAgent"
          # Data-plane events don't carry end-user claims; stamp service identity.
          default_user_identity: "fleet-analysis-automation"
          
          # Transform MQTT payload into agent prompt. Branch: full in-depth ONLY for true FLEET_CRITICAL automation.
          input_expression: >-
            template:Incoming JSON: {{json://input.payload}}

            BRANCHING (read the JSON and choose exactly one path):
            SECTION A — Use ONLY if payload.event_type is "FLEET_CRITICAL_ANALYSIS_REQUEST" AND payload.fleet_status is "FLEET_CRITICAL" (correlated fleet: typically ≥50% of active cooling assets in CRITICAL). This path replaces the short *Automated Fleet Analysis* Slack body with one consolidated in-depth report.

            SECTION A instructions (single Slack message; do NOT repeat eight full section headers once per sensor):
            - Produce ONE report using the Fleet Query Agent 8-section headings (1–8) exactly once at fleet level.

            SECTION A — HARD TOOL BUDGET (apples-to-apples; do not exceed):
            - get_incident_context: exactly ONE call per unique machine_id (machine-001, machine-002, machine-003) with minutes=120. Never call per inlet/motor/outlet point id.
            - get_machine_plotly_spec: exactly ONE call per machine_id (same three machines), minutes=120, value_key=avg_v. This is the ONLY chart tool allowed in SECTION A.
            - recommend_dispatch_technicians: at most ONE call total — use the single hottest point (e.g. machine-003:motor_temp_c). List top 3 techs once in section 8.
            - FORBIDDEN in SECTION A: get_plotly_spec, get_chart_series, get_sensor_details, get_sketches, get_recent_alerts (unless user explicitly asks in the payload).

            SECTION A — CHART LINKS (exactly three in the whole report):
            - All chart URLs must be machine-plotly-html (combined inlet·outlet·motor), copied verbatim from get_machine_plotly_spec only.
            - List them ONLY under a "Chart Evidence" subsection at the end of section 1 Summary (one bullet per machine, three bullets total).
            - NEVER put chart URLs under ### headings. NEVER use plotly-html?sensor_id= per-point links in SECTION A.

            SECTION A — STRUCTURE:
            - Optional ### <sensor_id> subheadings in Summary/Timeline are text-only (temps, zones, sketch interpretation). No "Chart:" lines under ###.
            - Section 7: exactly ONE bullet — "Sketch evidence (by machine): machine-001=N, machine-002=N, machine-003=N" from statistics.sketch_count of the three get_incident_context calls. Do not paste debug.section_7_lines.
            - Section 8: ONE dispatch block (mock CMMS, read-only). Do not repeat "For sensor machine-00x:motor_temp_c" sections with duplicate tech lists.

            - Slack formatting: paste plotly_html_url_pinned exactly from get_machine_plotly_spec JSON. No markdown [label](url) unless url is https.

            SECTION B — Use for ALL other payloads (including non-fleet triggers or missing fields): at most 6 short sentences, Slack-ready, with severity and immediate actions only; NO per-asset forensic loop, NO get_incident_context unless the user payload explicitly asks for an asset deep-dive.

            This message is only the *Automated Fleet Analysis* path (analysis-response → Slack). It must NOT change behavior for ordinary per-sensor CRITICAL alerts or the separate FLEET STATUS Slack card.
          
          payload_encoding: "utf-8"
          payload_format: "json"
          on_success: "fleet_analysis_success"
          on_error: "fleet_analysis_error"
      
      # Route to Fleet Query Agent
      default_agent_name: "FleetQueryAgent"

      output_handlers:
        # Publish full task_response JSON so consumers can read report text plus
        # SAM token fields on a2a_task_response.metadata (total_input_tokens, etc.).
        - name: "fleet_analysis_success"
          topic_expression: "static:sensors/fleet/analysis-response"
          payload_expression: "task_response:"
          payload_encoding: "utf-8"
          payload_format: "json"
        - name: "fleet_analysis_error"
          topic_expression: "static:sensors/fleet/analysis-error"
          payload_expression: "task_response:a2a_task_response.error"
          payload_encoding: "utf-8"
          payload_format: "json"
      
      # Artifact service for any attachments
      artifact_service: *default_artifact_service
      
      # System purpose for this gateway's context
      system_purpose: |
        You are an automated fleet analysis system for MQTT-triggered analysis requests.

        If the inbound message selects SECTION A (true FLEET_CRITICAL automation payload), produce
        one consolidated in-depth Slack report as instructed (fleet-level 8 sections, per-asset
        subsections, charts, limited dispatch tool calls).

        Otherwise (SECTION B), stay brief: at most six sentences, no deep multi-asset loop.

        Use emoji sparingly: 🔴 Critical, 🟡 Warning, 🟢 Normal, ⚠️ Action needed
      
      # Response handling - publish to response topic
      # The Slack gateway or other consumers can subscribe to this
      response_topic: "sensors/fleet/analysis-response"

      # This gateway is fed by internal broker events (no user JWT claims on message).
      # Provide a stable service identity so AuthAndEnrich does not discard triggers.
      default_user_identity: "fleet-analysis-automation"
      force_user_identity: "fleet-analysis-automation"
      
      # Authorization (none for internal automated triggers)
      authorization_service:
        type: "none"
