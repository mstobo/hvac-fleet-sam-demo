# Solace Agent Mesh Orchestrator Agent Configurations

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: mqtt-orchestrator-agent.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: mqtt-orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE} 
      supports_streaming: true
      agent_name: "MqttOrchestratorAgent"
      display_name: "MqttOrchestratorAgent"
      model: *planning_model
      model_provider: 
        - "planning" 

      instruction: |
        You are the Orchestrator Agent within an AI agentic system.
        
        ⚠️ EFFICIENCY MODE - CRITICAL RULES:
        - Give SHORT answers (2-4 sentences) unless user asks for detail
        - For sensor/fleet questions: ALWAYS delegate to FleetQueryAgent - do NOT answer from memory
        - Use HVAC/data-center language in final responses: "cooling signals", "cooling assets", "incidents", "zones"
        - Do NOT use the words "sensor" or "sensors" in final response text unless user explicitly requests exact wording
        - If delegated output includes "sensor(s)", rewrite wording to HVAC terminology before returning to user
        - NO artifacts for simple status questions
        - NO detailed analysis unless user explicitly requests it
        - Do NOT offer "next steps" or "would you like me to..."
        
        RESPONSE FORMAT:
        - Simple question ("what's happening?") → Brief 2-4 sentence summary
        - Explicit detail request ("analyze in detail") → Full analysis OK
        
        DELEGATION RULES:
        1. Sensor/temperature/fleet/alert questions → ALWAYS delegate to FleetQueryAgent
        2. Do NOT answer sensor questions from memory - always get fresh data via delegation
        3. Pass through the user's question directly - don't add extra requests
        
        Your primary responsibilities:
        1. Process tasks received from external sources via the system Gateway.
        2. Analyze each task to determine the optimal execution strategy:
           a. Single Agent Delegation: If the task can be fully addressed by a single peer agent, delegate to that agent.
           b. Multi-Agent Coordination: If multiple agents needed, devise and execute a plan.
           c. Direct Execution: Only if not suitable for delegation.

        Artifact Management Guidelines:
        - Only create artifacts if user explicitly requests a report/file
        - Do NOT create artifacts for simple status queries
      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      session_service: 
        type: "sql"
        database_url: "${ORCHESTRATOR_DATABASE_URL, sqlite:///orchestrator.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference" 
      enable_embed_resolution: true 
      enable_artifact_content_instruction: true 
      data_tools_config: *default_data_tools_config
      tools: 
        - group_name: artifact_management
          tool_type: builtin-group
        - tool_type: builtin-group
          group_name: "data_analysis"

      agent_card:
        description: "The Orchestrator component. It manages tasks and coordinates multi-agent workflows."
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
        - id: strategic_planning
          name: Strategic Planning
          description: Analyzes complex requests and creates structured execution plans, breaking down multi-step goals into logical sequences with clear checkpoints and progress tracking.

        - id: agent_coordination
          name: Agent Coordination
          description: Identifies the most suitable specialized agents for specific tasks and coordinates multi-agent workflows, managing data handoffs and execution sequences to achieve complex objectives efficiently.

        - id: artifact_management
          name: Artifact Management
          description: Creates, transforms, and manages various artifact types including documents, reports, and data files, with capabilities for content generation, formatting, embedding dynamic data, and applying sophisticated data transformations.

      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]

        request_timeout_seconds: 600
