log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: chart-database-agent.log

!include ../shared_config.yaml

apps:
  - name: chart-database-agent-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "ChartDatabaseAgent"
      display_name: "Chart Database Agent"
      model: *general_model

      instruction: |
        You are a SQL assistant for chart and incident analytics data.

        Your database contains SQLite rollups and points generated by the chart writer:
        - chart_points
        - chart_rollups_10s
        - chart_rollups_1m

        SCHEMA (do not invent column names):
        - chart_rollups_10s / chart_rollups_1m:
          bucket_ts (TEXT, ISO-8601 UTC ending in Z), sensor_id, source ('suppressed'|'filtered'),
          min_v, max_v, sum_v, count_v, last_v
          There is NO "timestamp" column on rollups — use bucket_ts.
          Average for bucket: sum_v / NULLIF(count_v, 0) AS avg_v
        - chart_points:
          ts (TEXT, ISO-8601 UTC), sensor_id, value, zone, source, id, created_at
          There is NO asset_id — use sensor_id. There is NO reading_type column.

        TIME WINDOWS (SQLite):
        Timestamps are stored as ISO TEXT with 'Z'. Prefer strftime bounds compatible with that form, e.g.:
          WHERE bucket_ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-60 minutes')
        For relative windows, include BOTH bounds to prevent stale spillover:
          bucket_ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-60 minutes')
          AND bucket_ts <= strftime('%Y-%m-%dT%H:%M:%SZ', 'now')
        Do not filter rollups with a non-existent "timestamp" column.
        If rollups are empty, fall back to chart_points with ts in the same style.

        EMPTY OR "[]" RESULTS — mandatory:
        - Never reply with only empty brackets or raw []. Always explain: which table, time predicate, and row count.
        - If the user's window returns 0 rows, run a quick bounds query (one extra execute_sql_query is OK), e.g.:
          SELECT COUNT(*) AS n, MIN(bucket_ts) AS oldest, MAX(bucket_ts) AS newest FROM chart_rollups_1m;
          and similarly for chart_points using ts.
        - If newest data is older than the requested window, say so and report the actual data range; suggest a shorter window or ensuring chart_writer_service is running and publishing pipeline topics.
        - If sanity check shows COUNT(*)=0 for BOTH chart_rollups_1m and chart_points (global empty), widening the time window will not help. State clearly that no ingestion has been recorded: run chart_writer_service (subscribes to dc/v1/pipeline/suppressed and filtered) alongside the deadband pipeline that publishes those topics, using the same broker and CHART_DB_PATH / chart_data.db as this agent. Do not ask the user to pick diagnostics in that case—give this fix as the primary next step.
        - Multi-device / fleet charting: use chart_rollups_1m with GROUP BY sensor_id (and ORDER BY COUNT(*) DESC LIMIT 20). Do not invent asset_id or reading_type columns.

        Query workflow:
        1) Understand the chart/trend question
        2) If window is wide (e.g. 24h), prefer chart_rollups_1m; use chart_points only for fine granularity when row volume is acceptable
        3) Generate SQL
        4) Use execute_sql_query
        5) Summarize clearly; if zero rows, include bounds/diagnostic context from above
        6) Always report effective time bounds used and returned min/max timestamp so caller can validate freshness

        Safety:
        - Default to SELECT queries.
        - Do not assume columns/tables beyond detected schema.

      agent_init_function:
        module: "sam_sql_database.lifecycle"
        name: "initialize_sql_agent"
        config:
          db_type: "sqlite"
          db_name: "${CHART_SQLITE_DB_NAME, chart_data.db}"
          database_purpose: "${CHART_DB_PURPOSE, Time-series chart rollups for HVAC telemetry incidents}"
          data_description: "${CHART_DB_DESCRIPTION, Contains chart_points, chart_rollups_10s, chart_rollups_1m tables from chart_writer_service}"
          auto_detect_schema: true
          query_examples:
            - natural_language: "1-minute rollups for one sensor in the last hour (UTC)"
              sql_query: |
                SELECT bucket_ts, sensor_id, source,
                       min_v, max_v, (sum_v * 1.0 / NULLIF(count_v,0)) AS avg_v, last_v, count_v
                FROM chart_rollups_1m
                WHERE sensor_id = 'm3-temp-motor'
                  AND bucket_ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-60 minutes')
                ORDER BY bucket_ts ASC;
            - natural_language: "10-second rollups fallback for last 15 minutes"
              sql_query: |
                SELECT bucket_ts, sensor_id, source, min_v, max_v, last_v, count_v
                FROM chart_rollups_10s
                WHERE bucket_ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-15 minutes')
                ORDER BY bucket_ts ASC;
            - natural_language: "Raw-ish points for a sensor in the last hour"
              sql_query: |
                SELECT ts, sensor_id, value, zone, source
                FROM chart_points
                WHERE sensor_id = 'm3-temp-motor'
                  AND ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-60 minutes')
                ORDER BY ts ASC;
            - natural_language: "Fleet-wide 24h activity: which devices have rollup buckets"
              sql_query: |
                SELECT sensor_id, source, COUNT(*) AS buckets,
                       MIN(bucket_ts) AS first_ts, MAX(bucket_ts) AS last_ts,
                       AVG(sum_v * 1.0 / NULLIF(count_v,0)) AS avg_value
                FROM chart_rollups_1m
                WHERE bucket_ts >= strftime('%Y-%m-%dT%H:%M:%SZ', 'now', '-24 hours')
                GROUP BY sensor_id, source
                ORDER BY buckets DESC
                LIMIT 30;
            - natural_language: "Sanity check when user sees no data"
              sql_query: |
                SELECT 'chart_rollups_1m' AS tbl, COUNT(*) AS rows, MIN(bucket_ts) AS min_ts, MAX(bucket_ts) AS max_ts FROM chart_rollups_1m
                UNION ALL
                SELECT 'chart_points', COUNT(*), MIN(ts), MAX(ts) FROM chart_points;

      agent_cleanup_function:
        module: "sam_sql_database.lifecycle"
        name: "cleanup_sql_agent_resources"

      tools:
        - tool_type: python
          component_module: "sam_sql_database.tools"
          function_name: "execute_sql_query"

      session_service:
        <<: *default_session_service

      artifact_service:
        <<: *default_artifact_service

      agent_card:
        description: |
          SQL agent for charting and trend analysis from SQLite rollup tables.
          Useful for incident timelines, trend summaries, and chart-ready series extraction.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text", "file"]
        skills:
          - id: "chart_query"
            name: "Chart Data Query"
            description: "Query rollups and points for trend/chart data."
            examples:
              - "Get 10-second rollups for m3-temp-motor for the last 2 hours"
              - "Show min/max/avg trends from chart_rollups_1m for dc1"
              - "Summarize chart_points anomalies for m2 in the last 30 minutes"
            tags: ["sql", "charts", "timeseries", "analytics"]

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["*"]
        request_timeout_seconds: 120
