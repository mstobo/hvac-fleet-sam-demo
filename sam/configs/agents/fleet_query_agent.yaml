# Fleet Query Agent
# ─────────────────────────────────────────────────────────────────────────────
# SAM Agent for querying the sensor pipeline SQLite database.
# 
# This agent uses an LLM to interpret user questions and call the appropriate
# query tools. The actual sensor data processing happens in the deterministic
# pipeline (mock_pipeline.py) - this agent only READS from the database.
#
# Architecture:
#   User Question → LLM → Query Tools → SQLite → LLM → Natural Language Answer
# ─────────────────────────────────────────────────────────────────────────────

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: fleet-query-agent.log

!include ../shared_config.yaml

apps:
  - name: fleet-query-agent-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    
    broker_request_response:
      enabled: true
      broker_config: *broker_connection
      request_expiry_ms: 60000
      payload_encoding: utf-8
      payload_format: json
      response_topic_prefix: ${NAMESPACE}solace-agent-mesh/v1
      response_queue_prefix: ${NAMESPACE}solace-agent-mesh/v1

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "FleetQueryAgent"
      display_name: "Fleet Query Agent"
      
      model: *general_model
      
      instruction: |
        You are the Fleet Query Agent for a data-center HVAC monitoring system.
        Interpret sensor telemetry as cooling/environment signals (temperature, humidity, pressure context),
        and communicate in operations language suitable for facilities and reliability teams.
        
        ⚠️ EFFICIENCY MODE - BE CONCISE:
        - Give SHORT answers (2-4 sentences) unless user asks for detail
        - ONE tool call per question
        - NO artifacts for simple status questions
        - NO detailed forensic analysis unless explicitly requested
        
        AUTONOMY — DO NOT STALL:
        - Never ask the user to "confirm", "approve", or "proceed" before running tools. If a tool can answer the question, call it immediately.
        - Do not promise bulk per-asset "trend artifacts" or similar file outputs unless the user explicitly asked for a report/file. Summarize trends in the reply using tool results.
        - If scope is unclear, default to a fleet-wide snapshot: get_fleet_status() or get_sketches(limit=20)—do not ask for an asset list first.
        - Infer asset/reading intent from IDs (e.g. m3-temp-motor → temperature at motor) silently; only ask a clarifying question if the user gave zero identifiers and the question cannot be answered fleet-wide.
        
        CHART MICROservice PATH (preferred for chart/trend latency):
        - For chart/time-series questions about a specific cooling asset (for example "last 60m trend for m3-temp-motor"),
          call get_chart_series first instead of composing large SQL-style payloads.
        - Use get_chart_series output (labels_hhmm_utc, values, stats) as the primary numeric source for chart-ready responses.
        - If the user asks for Plotly, figure spec JSON, or a renderer-safe chart contract, use get_plotly_spec.
        - When get_plotly_spec returns plotly_html_url_pinned, prefer that URL in the final answer over relative-minute URLs.
        - Only call other tools (get_sketches/get_recent_alerts) when the user explicitly asks for incident context beyond the numeric trend.
        
        TERMINOLOGY GUIDELINES:
        - Prefer "cooling asset", "zone", "row", "rack", "incident", and "fleet status"
        - Prefer "cooling signals" or "asset telemetry" over "sensors" in normal responses
        - Even if the user says "sensors", your response should still default to HVAC terminology ("cooling signals/assets")
        - At most once per answer, you may clarify parenthetically as "(sensor telemetry)" for continuity
        - DO NOT use the words "sensor" or "sensors" in final response text unless the user explicitly requests exact wording preservation
        - Use severity/zone terms consistently: NORMAL, WARNING, CRITICAL
        - Avoid generic wording like "sensor system" when "data-center HVAC" is clearer
        - If data only contains temperature, do not invent humidity/pressure values; mention they are not currently present
        
        SHORT STATUS TEMPLATE (use for "what's happening" style questions):
        1) "Most cooling signals are in NORMAL with [trend summary]."
        2) "Exception: [asset/point] is in [WARNING/CRITICAL] at [temp] with [trend/window context]."
        3) "Supporting ranges: motors [x-y]°C, outlets [x-y]°C, inlets [x-y]°C."
        Keep this to 2-3 sentences total.
        
        RESPONSE FORMAT:
        - Simple question → Brief summary (2-4 sentences)
        - "Analyze in detail" / "investigate" → Full analysis with recommendations
        - Default to SHORT. User will ask for more if needed.
        
        DETAILED INCIDENT FORMAT (mandatory when user asks for detail/investigation):
        Use this exact section order:
        1) Summary
        2) Timeline
        3) Severity & Impact
        4) Probable Causes (ranked)
        5) Immediate Actions
        6) Follow-up / Forensics
        7) Data Gaps / Confidence
        - Use these headings verbatim, including punctuation/casing.
        - Do not add, remove, or rename section headings.
        - If data is missing for a section, include the section and state "Insufficient data."
        - DEBUG REQUIREMENT (for now): In section 7 (Data Gaps / Confidence), include a line:
          "Sketch evidence: <N> sketches reviewed."
          where N is derived from tool output (sketch_count, recent_sketches length, or sketches length).
        - Conditional debug output rule:
          - Only include the "Sketch evidence: <N> sketches reviewed." line when tool output contains:
            debug.sketch_evidence_enabled = true and debug.sketch_evidence_note.
          - If debug block is absent, do not add sketch-evidence debug lines.
        
        DETAILED STYLE RULES:
        - Keep HVAC/data-center terminology ("cooling assets", "asset telemetry", "incidents", "zones")
        - Use confidence language clearly: probable / suggests / not confirmed
        - Do not present hypotheses as confirmed facts
        - Prefer operationally actionable language for facilities/reliability teams

        TOOL ORDER FOR INVESTIGATIONS (mandatory):
        - For any "detail", "investigate", "incident", "root cause", or "forensics" request:
          1) Call get_incident_context FIRST (deterministic sketch-first bundle).
          2) Then call other tools only if needed for numeric drill-down (get_sensor_details, get_recent_alerts).
        - Do not start detailed investigations with get_sensor_details or get_recent_alerts.
        - HARD GUARD: the first tool call for detailed incident requests MUST be get_incident_context.
        - If your planned first call is anything else, STOP and call get_incident_context instead.
        - If you already called a different tool first, discard that plan and restart with get_incident_context.
        - If sketches exist, reference them explicitly in Summary and Timeline sections.
        - If sketches are unavailable, state "Insufficient sketch context" in Data Gaps / Confidence.
        
        Example GOOD response for "What's happening with m1?":
        "Cooling asset m1 is operating normally. m1 inlet/outlet/motor temperatures are stable and in NORMAL zone.
        No active incident indicators for m1 in the current window."
        
        Example BAD response (too long for simple question):
        [Executive summary, key findings, per-sensor breakdown, recommendations, artifacts...]
        
        TOOL SELECTION (pick ONE):
        | Question | Tool | Stop After? |
        |----------|------|-------------|
        | "What's happening with m1?" | get_sketches(sensor_filter="m1") | YES - summarize and done |
        | "Recent activity?" | get_sketches() | YES |
        | "Any alerts?" | get_recent_alerts() | YES |
        | "Fleet status?" | get_fleet_status() | YES |
        | "Detailed analysis of incident" | get_incident_context(sensor_id, minutes) first | NO - dig deeper |
        | "Chart/trend for one asset over time" | get_chart_series(sensor_id, minutes, source='filtered') | YES |
        | "Need Plotly chart spec/JSON" | get_plotly_spec(sensor_id, minutes, source='filtered') | YES |
        
        PROHIBITED unless user asks for detail:
        - Creating artifacts/reports
        - Calling 3+ tools
        - Multi-paragraph responses
        - Recommendations sections
        - "Next steps" offers
        - Asking the user to confirm scope before the first tool call
        - Offering to generate artifacts for "all assets" without an explicit user request for files/reports
        - Using multiple tools for simple chart-only requests when get_chart_series can answer directly

        PROHIBITED for detailed incident requests:
        - First tool call = get_sensor_details
        - First tool call = get_recent_alerts
        - First tool call = get_sketches (use get_incident_context instead)
        - Any detailed report built without get_sketches context
        
        Sketches contain: temperature, zone, trend, window stats, description.
        That's enough for "what's happening" - don't call sensor_details too.

      tools:
        # Query recent alerts
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_recent_alerts
          tool_name: "get_recent_alerts"
          description: "Query recent alerts from the sensor pipeline. Use when user asks about alerts, warnings, or anomalies."
          parameters:
            - name: minutes
              type: integer
              description: "How far back to look (default 60 minutes)"
              default: 60
            - name: severity
              type: string
              description: "Filter by severity: LOW, MEDIUM, HIGH, or CRITICAL (optional)"
              required: false
            - name: limit
              type: integer
              description: "Maximum number of alerts to return (default 20)"
              default: 20

        # Get alert summary statistics
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_alert_summary
          tool_name: "get_alert_summary"
          description: "Get a summary of alert activity. Use for statistics or overview questions."
          parameters:
            - name: minutes
              type: integer
              description: "Time window in minutes (default 60)"
              default: 60

        # Get current fleet status
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_fleet_status
          tool_name: "get_fleet_status"
          description: "Get current fleet health status. Use when user asks about overall system status."

        # Get fleet status history
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_fleet_history
          tool_name: "get_fleet_history"
          description: "Get fleet status history over time. Use for trend questions."
          parameters:
            - name: minutes
              type: integer
              description: "Time window in minutes (default 60)"
              default: 60

        # Get sensor details
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_sensor_details
          tool_name: "get_sensor_details"
          description: "Get numeric drill-down for a specific cooling asset/sensor. For detailed incidents, use ONLY after get_sketches has been called first."
          parameters:
            - name: sensor_id
              type: string
              description: "The sensor identifier (e.g., sensor-001)"
              required: true
            - name: minutes
              type: integer
              description: "Time window in minutes (default 30)"
              default: 30

        # Deterministic incident context (sketch-first bundle)
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_incident_context
          tool_name: "get_incident_context"
          description: "Detailed incident context tool. Always loads sketches first, then numeric readings and matching alerts."
          parameters:
            - name: sensor_id
              type: string
              description: "Cooling asset/sensor identifier (e.g., m3-temp-motor)"
              required: true
            - name: minutes
              type: integer
              description: "Time window in minutes (default 90)"
              default: 90

        # Get sketch summaries
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_sketches
          tool_name: "get_sketches"
          description: "Get natural language summaries of sensor behavior. Use when user asks what's been happening."
          parameters:
            - name: minutes
              type: integer
              description: "Time window in minutes (default 30)"
              default: 30
            - name: zone
              type: string
              description: "Filter by zone: NORMAL, WARNING, or CRITICAL (optional)"
              required: false
            - name: limit
              type: integer
              description: "Maximum number of sketches to return (default 20)"
              default: 20

        # Get system statistics
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_system_statistics
          tool_name: "get_system_statistics"
          description: "Get overall system statistics. Use for metrics or data volume questions."

        # Get chart-ready deterministic series from chart_query_service
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_chart_series
          tool_name: "get_chart_series"
          description: "Fetch chart-ready time-series JSON (labels, values, stats) for one cooling asset from chart_query_service. Preferred for chart-only trend questions."
          parameters:
            - name: sensor_id
              type: string
              description: "Cooling asset/sensor identifier (e.g., m3-temp-motor)"
              required: true
            - name: minutes
              type: integer
              description: "Lookback window in minutes (default 60)"
              default: 60
            - name: source
              type: string
              description: "Series source: filtered, suppressed, or all"
              default: "filtered"
            - name: resolution
              type: string
              description: "Resolution: 1m, 10s, or points"
              default: "1m"
            - name: max_points
              type: integer
              description: "Maximum points returned (default 120)"
              default: 120
            - name: compact
              type: boolean
              description: "If true, omit verbose rows and return compact chart payload"
              default: true

        # Get renderer-ready Plotly spec from chart_query_service
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: get_plotly_spec
          tool_name: "get_plotly_spec"
          description: "Fetch deterministic Plotly figure JSON spec for one cooling asset time-series (no Mermaid dependency)."
          parameters:
            - name: sensor_id
              type: string
              description: "Cooling asset/sensor identifier (e.g., m3-temp-motor)"
              required: true
            - name: minutes
              type: integer
              description: "Lookback window in minutes (default 60)"
              default: 60
            - name: source
              type: string
              description: "Series source: filtered, suppressed, or all"
              default: "filtered"
            - name: resolution
              type: string
              description: "Resolution: 1m, 10s, or points"
              default: "1m"
            - name: max_points
              type: integer
              description: "Maximum points returned (default 120)"
              default: 120
            - name: value_key
              type: string
              description: "Value field for y-axis: avg_v, last_v, value, min_v, or max_v"
              default: "avg_v"

        # Acknowledge an alert
        - tool_type: python
          component_module: fleet_query_tools
          component_base_path: src
          function_name: acknowledge_alert
          tool_name: "acknowledge_alert"
          description: "Acknowledge an alert (mark as reviewed). Use when user wants to clear/acknowledge alerts."
          parameters:
            - name: alert_id
              type: integer
              description: "The ID of the alert to acknowledge"
              required: true

      session_service:
        type: "sql"
        database_url: "sqlite:///fleet_query_agent.db"
        default_behavior: "PERSISTENT"
      
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      
      agent_card:
        name: "FleetQueryAgent"
        display_name: "Fleet Query Agent"
        description: |
          Query agent for a data-center HVAC monitoring system.
          Ask about incidents, fleet status, cooling asset readings, and trends.
        skills:
          - id: "query_alerts"
            name: "Query Alerts"
            description: "Get recent alerts, filter by severity or time"
            tags: ["alerts", "query"]
          - id: "fleet_status"
            name: "Fleet Status"
            description: "Check overall fleet health and sensor status"
            tags: ["fleet", "status"]
          - id: "sensor_details"
            name: "Cooling Asset Details"
            description: "Get detailed info about specific cooling assets or sensors"
            tags: ["hvac", "asset", "details"]
          - id: "trends"
            name: "Trend Analysis"
            description: "Analyze patterns and trends over time"
            tags: ["trends", "analysis"]
      
      agent_card_publishing:
        interval_seconds: 10
      
      agent_discovery:
        enabled: true
