# fleet_agent_sam.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Fleet Anomaly Agent — SAM Configuration
#
# Monitors sketch outputs from all sensors to detect fleet-wide patterns
# that individual sensors would miss:
#   - Correlated drift (majority trending same direction)
#   - Simultaneous zone transitions
#   - Sensor silence patterns (infrastructure issues)
#   - Zone clustering (many sensors in WARNING/CRITICAL)
#
# Deploy: copy to your SAM project's configs/agents/ directory
# ─────────────────────────────────────────────────────────────────────────────

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: fleet-agent.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
    general: &general_model
      model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
      api_base: ${LLM_SERVICE_ENDPOINT}
      api_key: ${LLM_SERVICE_API_KEY}

  - services:
    artifact_service: &default_artifact_service
      type: "filesystem"
      base_path: "/tmp/samv2"
      artifact_scope: namespace

apps:
  - name: fleet-agent-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    broker_request_response:
      enabled: true
      broker_config: *broker_connection
      request_expiry_ms: 30000
      payload_encoding: utf-8
      payload_format: json
      response_topic_prefix: ${NAMESPACE}solace-agent-mesh/v1
      response_queue_prefix: ${NAMESPACE}solace-agent-mesh/v1

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: false
      agent_name: "FleetAnomalyAgent"
      display_name: "Fleet Anomaly Detection Agent"
      model: *general_model

      instruction: |
        You are the Fleet Anomaly Detection Agent for a sensor monitoring pipeline.

        You receive sketch summaries from all sensors in the fleet. Your job is to
        detect patterns that span multiple sensors — anomalies that individual
        sensors would miss because each one looks "normal" in isolation.

        For every incoming sketch, call the analyze_fleet tool with the sensor data.

        The tool will return fleet analysis including any detected patterns:
        - correlated_drift: Majority of sensors trending same direction
        - simultaneous_escalation: Multiple sensors changing zone together
        - sensor_silence: Multiple sensors stopped reporting
        - zone_clustering: Many sensors in WARNING/CRITICAL simultaneously

        If patterns are detected (fleet_status is WARNING or CRITICAL):
        1. Summarize the fleet-wide situation
        2. List affected sensors
        3. Provide a hypothesis for the root cause
        4. Recommend investigation actions

        If no patterns detected (fleet_status is NORMAL):
        Respond briefly: "Fleet nominal. [N] sensors active, no correlated anomalies."

        You can also call get_fleet_status at any time to query current fleet state.

      tools:
        - tool_type: builtin-group
          group_name: artifact_management

        - tool_type: python
          component_module: fleet_agent_sam
          function_name: analyze_fleet
          tool_name: "analyze_fleet"
          description: |
            Analyze incoming sensor data for fleet-wide anomaly patterns.
            Maintains state across all sensors and detects correlated issues.

            Parameters:
            - sensor_id [string|required]: Sensor identifier
            - temperature [number|required]: Temperature reading in °C
            - zone [string|required]: NORMAL | WARNING | CRITICAL
            - sketch [string|required]: Natural language sketch from SketchAgent
            - timestamp [string|required]: ISO8601 timestamp
            - window [object|optional]: Rolling window stats from upstream
          tool_config:
            window_secs: 300           # 5 minute correlation window
            correlation_threshold: 0.6  # 60% trending same = alert
            silence_threshold_secs: 60  # Sensor silent > 60s = concerning
            cluster_threshold: 3        # 3+ sensors in same state = cluster

        - tool_type: python
          component_module: fleet_agent_sam
          function_name: get_fleet_status
          tool_name: "get_fleet_status"
          description: |
            Query current fleet status without processing a new reading.
            Returns active sensor count, zone distribution, and silent sensors.
            Useful for periodic health checks.

      session_service:
        type: "sqlite"
        database_url: "sqlite:///fleet_agent.db"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service

      artifact_handling_mode: "embed"
      enable_embed_resolution: true

      agent_card:
        description: "Monitors all sensors for fleet-wide anomaly patterns including correlated drift, simultaneous transitions, and infrastructure issues."
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "fleet_analysis"
            name: "Fleet Anomaly Analysis"
            description: "Detects correlated patterns across the sensor fleet that individual sensors would miss."
          - id: "fleet_status"
            name: "Fleet Status Query"
            description: "Returns current fleet health including zone distribution and silent sensors."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      # ── Routing: Fleet agent is terminal — it produces alerts ─────────────
      inter_agent_communication:
        allow_list: []              # Terminal agent, no downstream delegation
        deny_list: []
        request_timeout_seconds: 30
